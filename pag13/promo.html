<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Ofertas Especiais</title>
</head>
<body>

    <div class="promo-container">
        <h1>PROMOÇÃO</h1>
        
        <div class="item">
            <p>Disco de Vinil - Metropolis Pt.2</p>
            <del>De: R$ 379,00</del>
            <span class="new">Por: R$ 299,00</span>
        </div>

        <div class="button-group">
            <a href="../pag8/store.html" class="btn">Ir para a Loja</a>
            <a href="/pag2/principal.html" class="btn btn-back">Voltar</a>
        </div>
    </div>

    <section class="timer-box">
        <h3>Lançamento do Novo Álbum</h3>
        
        <div class="countdown-display">
            <div class="timer-animado">
                <span class="unit">30d :</span>
                <span class="unit">12h :</span>
                <span class="unit">45m :</span>
                <span class="seconds-container">
                    <span class="seconds-digit"></span>s
                </span>
            </div>
        </div>

        <p class="status">Sistemas em contagem regressiva para lançamento</p>
    </section>

</body>
</html>
