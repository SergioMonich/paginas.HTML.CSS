<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Gallery - Visual Anthology</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-photos.css">
</head>
<body>
    <main class="container-galeria">
        <header>
            <h1>Galeria de Imagens</h1>
            <p class="subtitle">Highlights & Art</p>
        </header>

        <section class="gallery-grid">
            <figure class="gallery-item">
                <a href="#img1">
                    <img src="imagem2.jpg" alt="Live Concert 1">
                    <figcaption>Metropolis Tour 2026</figcaption>
                </a>
            </figure>

            <figure class="gallery-item">
                <a href="#img2">
                    <img src="imagem1.jpeg" alt="Live Concert 2">
                    <figcaption>A Banda</figcaption>
                </a>
            </figure>

            <figure class="gallery-item">
                <a href="#img3">
                    <img src="imagem3.webp" alt="Concept Art 1">
                    <figcaption>Disc Cover (Conceito)</figcaption>
                </a>
            </figure>
            
            </section>
    </main>

    <div class="lbox" id="img1">
        <div class="lbox-content">
            <a href="#gallery" class="lbox-close">&times;</a>
            <img src="imagem2.jpg" alt="Live Concert 1 Full">
        </div>
    </div>

    <div class="lbox" id="img2">
        <div class="lbox-content">
            <a href="#gallery" class="lbox-close">&times;</a>
            <img src="imagem1.jpeg" alt="Live Concert 2 Full">
        </div>
    </div>

    <div class="lbox" id="img3">
        <div class="lbox-content">
            <a href="#gallery" class="lbox-close">&times;</a>
            <img src="imagem3.webp" alt="Concept Art 1 Full">
        </div>
    </div>

    <div class="navigation">
        <a href="../pag4/blog.html" class="back-btn">Voltar Blog</a>
    </div>

</body>
</html>
